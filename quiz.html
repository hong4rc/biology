<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trắc Nghiệm</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#4361ee;--primary-light:#eef2ff;--primary-dark:#3a56d4;
  --success:#10b981;--success-light:#ecfdf5;--success-dark:#059669;
  --error:#ef4444;--error-light:#fef2f2;--error-dark:#dc2626;
  --warn:#f59e0b;--warn-light:#fffbeb;
  --surface:#fff;--bg:#f1f5f9;--text:#1e293b;--text2:#64748b;--border:#e2e8f0;
  --radius:16px;--shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);
  --shadow-lg:0 4px 24px rgba(0,0,0,.10);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:88px}

/* ── Topbar ── */
.topbar{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(67,97,238,.3)}
.topbar-left{display:flex;align-items:center;gap:10px;min-width:0}
.btn-home{width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;text-decoration:none}
.btn-home:hover{background:rgba(255,255,255,.25)}
.btn-home .material-icons-round{font-size:20px}
.topbar-title{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-shuffle{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,.4);background:transparent;color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0;font-family:inherit}
.btn-shuffle:hover{background:rgba(255,255,255,.15)}
.btn-shuffle.on{background:#fff;border-color:#fff;color:var(--primary)}
.btn-shuffle.on .material-icons-round{animation:spin .35s ease}
.btn-shuffle .material-icons-round{font-size:15px}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(180deg)}}
@media(max-width:480px){.btn-shuffle span:not(.material-icons-round){display:none}}

/* ── Progress strip ── */
.progress-strip{height:4px;background:rgba(255,255,255,.2);position:sticky;top:56px;z-index:49}
.progress-strip-fill{height:100%;background:#fff;border-radius:0 2px 2px 0;transition:width .4s ease}

/* ── Page ── */
.page{max-width:680px;margin:0 auto;padding:16px}

/* ── Stats row ── */
.stats-row{display:flex;gap:8px;margin-bottom:16px}
.stat-pill{flex:1;background:var(--surface);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow)}
.stat-pill .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stat-pill .dot.blue{background:var(--primary)}
.stat-pill .dot.green{background:var(--success)}
.stat-pill .dot.red{background:var(--error)}
.stat-pill .val{font-size:18px;font-weight:700;line-height:1}
.stat-pill .lbl{font-size:11px;color:var(--text2);margin-top:1px}

/* ── Question card ── */
.card{background:var(--surface);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);animation:fadeUp .25s ease;border-left:4px solid var(--primary)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.q-num{background:var(--primary);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.q-warn{display:inline-flex;align-items:center;gap:3px;background:var(--warn-light);color:#92400e;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;border:1px solid #fde68a}
.q-warn .material-icons-round{font-size:13px}
.q-text{font-size:15px;font-weight:600;line-height:1.65;color:var(--text)}

/* ── Options ── */
.options{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.option{display:grid;grid-template-columns:36px 1fr;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .18s;user-select:none;background:var(--surface)}
.option:hover:not(.disabled){border-color:var(--primary);background:var(--primary-light)}
.option:hover:not(.disabled) .opt-letter{background:var(--primary);color:#fff}
.opt-letter{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;background:var(--bg);color:var(--text2);transition:all .18s;flex-shrink:0}
.opt-text{font-size:14px;line-height:1.5;color:var(--text)}
.q-text sub,.q-text sup,.opt-text sub,.opt-text sup{font-size:.82em;line-height:0}
.option.correct{border-color:var(--success);background:var(--success-light)}
.option.correct .opt-letter{background:var(--success);color:#fff;border-radius:50%}
.option.wrong{border-color:var(--error);background:var(--error-light)}
.option.wrong .opt-letter{background:var(--error);color:#fff;border-radius:50%}
.option.disabled{cursor:default}
.option.disabled:not(.correct):not(.wrong){opacity:.55}

/* ── Sticky bottom nav ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--surface);border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
.btn-nav{flex:1;height:44px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;font-family:inherit}
.btn-nav.prev{background:var(--bg);color:var(--text)}
.btn-nav.prev:hover:not(:disabled){background:var(--border)}
.btn-nav.next{background:var(--primary);color:#fff;box-shadow:0 3px 10px rgba(67,97,238,.3)}
.btn-nav.next:hover:not(:disabled){background:var(--primary-dark)}
.btn-nav:disabled{opacity:.35;cursor:not-allowed}
.btn-nav .material-icons-round{font-size:18px}
.nav-counter{min-width:64px;text-align:center;font-size:13px;font-weight:700;color:var(--text2)}

/* ── Question map ── */
.qmap{background:var(--surface);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden}
.qmap-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.qmap-head h3{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.01em}
.qmap-legend{display:flex;gap:10px;flex-wrap:wrap}
.qmap-legend span{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);font-weight:500;white-space:nowrap}
.qmap-legend b{width:9px;height:9px;border-radius:2px;display:inline-block;flex-shrink:0}
.qmap-legend b.c{background:var(--success)}
.qmap-legend b.w{background:var(--error)}
.qmap-legend b.u{background:var(--border)}
.qmap-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.qmap-filters{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.qmap-filter{padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s;font-family:inherit;white-space:nowrap}
.qmap-filter.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.qmap-search{display:flex;align-items:center;gap:6px;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:4px 10px;flex-shrink:0}
.qmap-search .material-icons-round{font-size:14px;color:var(--text2)}
.qmap-search input{border:none;background:transparent;font-size:12px;font-family:inherit;color:var(--text);width:72px;outline:none}
.qmap-search input::placeholder{color:var(--text2)}
.grid-wrap{max-height:180px;overflow-y:auto;padding-right:2px}
.grid-wrap::-webkit-scrollbar{width:4px}
.grid-wrap::-webkit-scrollbar-track{background:transparent}
.grid-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}
.grid button{width:100%;height:34px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:var(--bg);color:var(--text2);transition:all .15s;font-family:inherit;display:flex;align-items:center;justify-content:center;white-space:nowrap;overflow:hidden}
.grid button:hover{background:var(--primary-light);color:var(--primary);transform:scale(1.1);z-index:1;position:relative}
.grid button.cur{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(67,97,238,.4);transform:scale(1.12);z-index:2;position:relative}
.grid button.ok{background:var(--success);color:#fff}
.grid button.ok:hover{background:var(--success-dark)}
.grid button.no{background:var(--error);color:#fff}
.grid button.no:hover{background:var(--error-dark)}
.grid button.ok.cur,.grid button.no.cur{box-shadow:0 2px 8px rgba(0,0,0,.2);transform:scale(1.12)}
.grid button.hidden{display:none}

/* ── Actions ── */
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.btn-action{padding:11px 8px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;color:var(--text2);transition:all .2s;font-family:inherit}
.btn-action:hover{border-color:var(--error);color:var(--error);background:var(--error-light)}
.btn-action .material-icons-round{font-size:16px}
@media(max-width:480px){
  .actions{grid-template-columns:repeat(2,1fr)}
}

/* ── Toast ── */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:999;display:flex;align-items:center;gap:8px;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .material-icons-round{font-size:16px}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:20px;padding:28px 24px;max-width:340px;width:100%;text-align:center;animation:fadeUp .25s ease;box-shadow:var(--shadow-lg)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:6px}
.modal p{font-size:13px;color:var(--text2);margin-bottom:22px;line-height:1.5}
.modal-btns{display:flex;gap:10px}
.modal-btns button{flex:1;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.modal-btns .cancel{background:var(--bg);color:var(--text)}
.modal-btns .confirm{background:var(--error);color:#fff}

/* ── Topbar action group + flag button ── */
.topbar-actions{display:flex;gap:8px;flex-shrink:0}
.btn-flag{margin-left:auto;width:34px;height:34px;border-radius:9px;border:none;background:var(--bg);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0}
.btn-flag:hover,.btn-flag.on{background:var(--warn-light);color:var(--warn)}
.btn-flag .material-icons-round{font-size:20px}
.grid button.flag{position:relative}
.grid button.flag::after{content:'';position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--warn);box-shadow:0 0 0 1.5px var(--surface)}

/* ── Completion summary ── */
.done-emoji{font-size:42px;line-height:1;margin-bottom:8px}
.done-score{font-size:34px;font-weight:800;color:var(--primary);line-height:1.1}
.done-pct{font-size:14px;color:var(--text2);margin-top:2px}
.done-breakdown{display:flex;gap:10px;justify-content:center;margin:18px 0 22px}
.done-stat{flex:1;background:var(--bg);border-radius:12px;padding:10px 8px}
.done-stat .n{font-size:20px;font-weight:700;line-height:1}
.done-stat .l{font-size:11px;color:var(--text2);margin-top:3px}
.done-stat.correct .n{color:var(--success-dark)}
.done-stat.wrong .n{color:var(--error-dark)}
.done-btns{display:flex;flex-direction:column;gap:8px}
.done-btns button{padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.done-btns .primary{background:var(--primary);color:#fff}
.done-btns .ghost{background:var(--bg);color:var(--text)}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="btn-home" title="Trang chủ">
      <span class="material-icons-round">arrow_back</span>
    </a>
    <span class="topbar-title" id="h-title">Trắc Nghiệm</span>
  </div>
  <div class="topbar-actions">
    <button class="btn-shuffle" id="auto-btn" onclick="toggleAuto()" title="Tự động chuyển câu sau khi trả lời">
      <span class="material-icons-round">fast_forward</span>
      <span id="auto-label">Tự chuyển</span>
    </button>
    <button class="btn-shuffle" id="shuffle-btn" onclick="toggleShuffle()" title="Trộn thứ tự câu (phím S)">
      <span class="material-icons-round">shuffle</span>
      <span id="shuffle-label">Trộn</span>
    </button>
  </div>
</div>
<div class="progress-strip"><div class="progress-strip-fill" id="prog-fill" style="width:0%"></div></div>

<div class="page">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-pill"><div class="dot blue"></div><div><div class="val" id="s-total">0</div><div class="lbl">Đã làm</div></div></div>
    <div class="stat-pill"><div class="dot green"></div><div><div class="val" id="s-correct">0</div><div class="lbl">Đúng</div></div></div>
    <div class="stat-pill"><div class="dot red"></div><div><div class="val" id="s-wrong">0</div><div class="lbl">Sai</div></div></div>
  </div>

  <!-- Question -->
  <div id="question-area"></div>

  <!-- Question map -->
  <div class="qmap">
    <div class="qmap-head">
      <h3>Danh sách câu hỏi</h3>
      <div class="qmap-legend">
        <span><b class="c"></b>Đúng</span>
        <span><b class="w"></b>Sai</span>
        <span><b class="u"></b>Chưa</span>
      </div>
    </div>
    <div class="qmap-toolbar">
      <div class="qmap-filters">
        <button class="qmap-filter active" data-f="all" onclick="setFilter('all')">Tất cả</button>
        <button class="qmap-filter" data-f="unanswered" onclick="setFilter('unanswered')">Chưa làm</button>
        <button class="qmap-filter" data-f="wrong" onclick="setFilter('wrong')">Sai</button>
        <button class="qmap-filter" data-f="correct" onclick="setFilter('correct')">Đúng</button>
        <button class="qmap-filter" data-f="flagged" onclick="setFilter('flagged')">Đánh dấu</button>
      </div>
      <div class="qmap-search">
        <span class="material-icons-round">search</span>
        <input type="number" id="q-search" placeholder="Câu..." min="1" oninput="searchQuestion(this.value)">
      </div>
    </div>
    <div class="grid-wrap"><div class="grid" id="grid"></div></div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn-action" onclick="exportJSON()"><span class="material-icons-round">download</span> Xuất</button>
    <button class="btn-action" onclick="showModal('retry-wrong')"><span class="material-icons-round">replay</span> Thử lại sai</button>
    <button class="btn-action" onclick="showModal('restart')"><span class="material-icons-round">refresh</span> Làm lại</button>
    <button class="btn-action" onclick="showModal('reset')"><span class="material-icons-round">delete_forever</span> Xóa</button>
  </div>

</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <button class="btn-nav prev" id="btn-prev" onclick="go(-1)">
    <span class="material-icons-round">chevron_left</span> Trước
  </button>
  <div class="nav-counter" id="nav-counter">1 / ?</div>
  <button class="btn-nav next" id="btn-next" onclick="go(1)">
    Tiếp <span class="material-icons-round">chevron_right</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="done-modal">
  <div class="modal">
    <div class="done-emoji">🎉</div>
    <h3>Hoàn thành!</h3>
    <div class="done-score" id="done-score">0 / 0</div>
    <div class="done-pct" id="done-pct">0%</div>
    <div class="done-breakdown">
      <div class="done-stat correct"><div class="n" id="done-correct">0</div><div class="l">Đúng</div></div>
      <div class="done-stat wrong"><div class="n" id="done-wrong">0</div><div class="l">Sai</div></div>
    </div>
    <div class="done-btns">
      <button class="primary" id="done-review" onclick="reviewWrong()">Xem câu sai</button>
      <button class="ghost" onclick="restartFromDone()">Làm lại từ đầu</button>
      <button class="ghost" onclick="hideDone()">Đóng (xem lại)</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <p id="modal-desc"></p>
    <div class="modal-btns">
      <button class="cancel" onclick="hideModal()">Hủy</button>
      <button class="confirm" id="modal-confirm">Xác nhận</button>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const dataParam = params.get('data') || 'hoasinh';

let questions = [];
let quizTitle = 'Trắc Nghiệm';
let STORAGE_KEY = dataParam + '_quiz_progress';

const letters = ['A','B','C','D','E'];
let order = [];            // display position -> original question index
let current = 0;           // current display position (index into `order`)
let answers = {};          // keyed by ORIGINAL question index (stable across shuffle)
let flags = {};            // keyed by ORIGINAL question index (bookmarked questions)
let shuffleEnabled = false;
let autoAdvance = true;     // auto-jump to next question after answering
let advanceTimer = null;
let activeFilter = 'all';

const SUB_MAP = {'₀':'0','₁':'1','₂':'2','₃':'3','₄':'4','₅':'5','₆':'6','₇':'7','₈':'8','₉':'9','ₙ':'n','ₐ':'a','ₑ':'e','ₒ':'o','ₓ':'x','₋':'-','₊':'+'};
const SUP_MAP = {'⁰':'0','¹':'1','²':'2','³':'3','⁴':'4','⁵':'5','⁶':'6','⁷':'7','⁸':'8','⁹':'9','ⁿ':'n','⁺':'+','⁻':'-'};
function fmt(text) {
  return text
    .replace(/[₀₁₂₃₄₅₆₇₈₉ₙₐₑₒₓ₋₊]+/g, m => '<sub>' + [...m].map(c => SUB_MAP[c]??c).join('') + '</sub>')
    .replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹ⁿ⁺⁻]+/g,     m => '<sup>' + [...m].map(c => SUP_MAP[c]??c).join('') + '</sup>');
}

// Build the question-display order. Identity when shuffle is off,
// a Fisher–Yates permutation of question indices when on.
function buildOrder(shuffle) {
  const idx = questions.map((_, i) => i);
  if (shuffle) {
    for (let i = idx.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [idx[i], idx[j]] = [idx[j], idx[i]];
    }
  }
  return idx;
}

async function loadQuestions() {
  const res = await fetch('data/' + dataParam + '.json');
  const data = await res.json();
  questions = data.questions;
  quizTitle = data.title || quizTitle;
  STORAGE_KEY = data.storageKey || STORAGE_KEY;
  document.title = quizTitle;
  document.getElementById('h-title').textContent = quizTitle;
}

function load() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      const d = JSON.parse(saved);
      answers = d.answers || {};
      flags = d.flags || {};
      current = d.current || 0;
      order = Array.isArray(d.order) ? d.order : [];
      shuffleEnabled = !!d.shuffleEnabled;
      autoAdvance = d.autoAdvance !== false;   // default on
    } catch(e) {}
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    answers, flags, current, order, shuffleEnabled, autoAdvance,
    timestamp: new Date().toISOString()
  }));
}

function updateShuffleButton() {
  const btn = document.getElementById('shuffle-btn');
  const label = document.getElementById('shuffle-label');
  btn.classList.toggle('on', shuffleEnabled);
  label.textContent = 'Trộn';   // state shown by the filled .on highlight + toast
}

function toggleShuffle() {
  const currentQi = order[current];           // remember which question we're on
  shuffleEnabled = !shuffleEnabled;
  order = buildOrder(shuffleEnabled);
  const pos = order.indexOf(currentQi);        // stay on the same question after re-ordering
  current = pos >= 0 ? pos : 0;
  updateShuffleButton();
  toast(shuffleEnabled ? 'Đã trộn thứ tự câu hỏi' : 'Thứ tự câu hỏi ban đầu', 'shuffle');
  render();
}

function updateAutoButton() {
  const btn = document.getElementById('auto-btn');
  btn.classList.toggle('on', autoAdvance);
  document.getElementById('auto-label').textContent = 'Tự chuyển';   // state shown by the filled .on highlight + toast
}

function toggleAuto() {
  autoAdvance = !autoAdvance;
  clearTimeout(advanceTimer);
  updateAutoButton();
  toast(autoAdvance ? 'Tự chuyển câu: Bật' : 'Tự chuyển câu: Tắt', 'fast_forward');
  save();
}

function toggleFlag() {
  const qi = order[current];
  if (flags[qi]) delete flags[qi]; else flags[qi] = true;
  render();
  toast(flags[qi] ? 'Đã đánh dấu câu này' : 'Đã bỏ đánh dấu', 'bookmark');
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.qmap-filter').forEach(b => b.classList.toggle('active', b.dataset.f === f));
  renderGrid();
}

function questionFilterClass(qi) {
  if (answers[qi] === undefined) return 'unanswered';
  return answers[qi] === questions[qi].answer ? 'correct' : 'wrong';
}

function render() {
  clearTimeout(advanceTimer);   // any nav/toggle cancels a pending auto-advance; pick() re-schedules
  const qi = order[current];
  const q = questions[qi];
  const answered = answers[qi] !== undefined;

  const optionsHtml = q.options.map((opt, oi) => {
    let cls = answered ? 'disabled' : '';
    if (answered && oi === q.answer) cls += ' correct';
    if (answered && answers[qi] === oi && oi !== q.answer) cls += ' wrong';
    return `<div class="option ${cls}" onclick="pick(${oi})">
      <div class="opt-letter">${letters[oi]}</div>
      <div class="opt-text">${fmt(opt)}</div>
    </div>`;
  }).join('');

  document.getElementById('question-area').innerHTML = `
    <div class="card">
      <div class="q-meta">
        <span class="q-num">Câu ${current + 1}</span>
        ${q.uncertain ? '<span class="q-warn"><span class="material-icons-round">warning_amber</span>Chưa chắc</span>' : ''}
        <button class="btn-flag ${flags[qi] ? 'on' : ''}" onclick="toggleFlag()" title="Đánh dấu để xem lại">
          <span class="material-icons-round">${flags[qi] ? 'bookmark' : 'bookmark_border'}</span>
        </button>
      </div>
      <div class="q-text">${fmt(q.text)}</div>
      <div class="options">${optionsHtml}</div>
    </div>`;

  const answeredCount = Object.keys(answers).length;
  let correct = 0, wrong = 0;
  for (const k in answers) {
    if (answers[k] === questions[k].answer) correct++; else wrong++;
  }

  const pct = Math.round((answeredCount / questions.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('s-total').textContent = answeredCount;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('nav-counter').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === questions.length - 1;

  renderGrid();
  updateShuffleButton();
  updateAutoButton();
  save();
}

function renderGrid() {
  // Grid is labelled by play position (1,2,3…) in ascending order so it's tidy.
  // Each slot maps to whatever question sits at that position in `order`
  // (shuffled or not). Clicking jumps to that position.
  document.getElementById('grid').innerHTML = order.map((qi, p) => {
    const fc = questionFilterClass(qi);
    let hidden;
    if (activeFilter === 'all') hidden = false;
    else if (activeFilter === 'flagged') hidden = !flags[qi];
    else hidden = fc !== activeFilter;
    let cls = '';
    if (answers[qi] !== undefined) cls = answers[qi] === questions[qi].answer ? 'ok' : 'no';
    if (p === current) cls += ' cur';
    if (flags[qi]) cls += ' flag';
    if (hidden) cls += ' hidden';
    return `<button class="${cls.trim()}" onclick="jumpTo(${p})">${p + 1}</button>`;
  }).join('');
}

function pick(oi) {
  const qi = order[current];
  if (answers[qi] !== undefined) return;
  answers[qi] = oi;
  render();
  const isCorrect = oi === questions[qi].answer;
  const correctLetter = letters[questions[qi].answer];
  toast(isCorrect ? 'Chính xác!' : `Sai! Đáp án: ${correctLetter}`, isCorrect ? 'check_circle' : 'cancel');

  if (Object.keys(answers).length === questions.length) { showDone(); return; }
  if (autoAdvance) scheduleAdvance();
}

function scheduleAdvance() {
  clearTimeout(advanceTimer);
  advanceTimer = setTimeout(() => {
    advanceTimer = null;
    if (current < questions.length - 1) go(1);
  }, 850);
}

function go(dir) {
  clearTimeout(advanceTimer);
  const next = current + dir;
  if (next >= 0 && next < questions.length) { current = next; render(); }
}

function jumpTo(i) {
  clearTimeout(advanceTimer);
  current = i;
  document.getElementById('q-search').value = '';
  render();
}

function searchQuestion(val) {
  const n = parseInt(val);
  if (!val) { renderGrid(); return; }
  document.getElementById('grid').innerHTML = order.map((qi, p) => {
    if ((p + 1) !== n) return `<button class="hidden"></button>`;
    let cls = answers[qi] !== undefined ? (answers[qi] === questions[qi].answer ? 'ok' : 'no') : '';
    if (p === current) cls += ' cur';
    if (flags[qi]) cls += ' flag';
    return `<button class="${cls.trim()}" onclick="jumpTo(${p})">${p + 1}</button>`;
  }).join('');
}

function toast(msg, icon = 'info') {
  const t = document.getElementById('toast');
  t.innerHTML = `<span class="material-icons-round">${icon}</span>${msg}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function exportJSON() {
  const data = {
    title: quizTitle,
    exportedAt: new Date().toISOString(),
    totalQuestions: questions.length,
    answered: Object.keys(answers).length,
    correct: Object.keys(answers).filter(k => answers[k] === questions[k].answer).length,
    shuffled: shuffleEnabled,
    results: questions.map((q, i) => ({
      position: order.indexOf(i) + 1,   // slot shown in the app (Câu N), reflects shuffle
      question: q.id, text: q.text,
      selected: answers[i] !== undefined ? letters[answers[i]] : null,
      correct: letters[q.answer],
      isCorrect: answers[i] === q.answer,
      ...(q.uncertain ? {uncertain: true} : {})
    }))
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `quiz_${dataParam}_result.json`;
  a.click();
  toast('Đã xuất file JSON!', 'download');
}

function showModal(action) {
  const wrongCount = Object.keys(answers).filter(k => answers[k] !== questions[k].answer).length;
  const titles = {restart:'Làm lại bài thi?', reset:'Xóa toàn bộ dữ liệu?', 'retry-wrong':'Thử lại câu sai?'};
  const descs = {
    restart: 'Tất cả câu trả lời sẽ bị xóa. Bạn sẽ bắt đầu lại từ đầu.',
    reset: 'Dữ liệu tiến trình sẽ bị xóa vĩnh viễn khỏi trình duyệt.',
    'retry-wrong': `Xóa ${wrongCount} câu trả lời sai để thử lại. Câu đúng vẫn được giữ.`
  };
  document.getElementById('modal-title').textContent = titles[action];
  document.getElementById('modal-desc').textContent = descs[action];
  document.getElementById('modal').classList.add('show');
  document.getElementById('modal-confirm').onclick = () => {
    if (action === 'retry-wrong') {
      const wrongKeys = Object.keys(answers).filter(k => answers[k] !== questions[k].answer);
      wrongKeys.forEach(k => { delete answers[k]; });
      const p = order.findIndex(qi => wrongKeys.includes(String(qi)));  // first wrong in display order
      if (p >= 0) current = p;
    } else {
      answers = {}; current = 0;
      if (action === 'reset') { flags = {}; localStorage.removeItem(STORAGE_KEY); }
    }
    render(); hideModal();
    toast(action === 'retry-wrong' ? `Đã xóa ${wrongCount} câu sai!` : 'Đã xóa thành công!', 'check_circle');
  };
}

function hideModal() { document.getElementById('modal').classList.remove('show'); }

function showDone() {
  const total = questions.length;
  let correct = 0;
  for (const k in answers) if (answers[k] === questions[k].answer) correct++;
  const wrong = total - correct;
  document.getElementById('done-score').textContent = `${correct} / ${total}`;
  document.getElementById('done-pct').textContent = Math.round((correct / total) * 100) + '% chính xác';
  document.getElementById('done-correct').textContent = correct;
  document.getElementById('done-wrong').textContent = wrong;
  document.getElementById('done-review').style.display = wrong > 0 ? '' : 'none';
  document.getElementById('done-modal').classList.add('show');
}

function hideDone() { document.getElementById('done-modal').classList.remove('show'); }

function reviewWrong() {
  hideDone();
  setFilter('wrong');
  const p = order.findIndex(qi => answers[qi] !== undefined && answers[qi] !== questions[qi].answer);
  if (p >= 0) { current = p; render(); }
}

function restartFromDone() {
  hideDone();
  answers = {}; current = 0;
  render();
  toast('Đã làm lại từ đầu!', 'refresh');
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 's' || e.key === 'S') toggleShuffle();
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
  const n = parseInt(e.key);
  if (n >= 1 && n <= (questions[order[current]]?.options.length || 0)) pick(n - 1);
});

async function init() {
  await loadQuestions();
  load();
  if (!Array.isArray(order) || order.length !== questions.length) {
    order = buildOrder(shuffleEnabled);   // first run or stale/missing saved order
  }
  if (current < 0 || current >= questions.length) current = 0;
  render();
}
init();
</script>
</body>
