<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trắc Nghiệm Y Khoa</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#4361ee;--primary-light:#eef2ff;
  --success:#10b981;--success-light:#ecfdf5;--success-dark:#059669;
  --error:#ef4444;--error-light:#fef2f2;--error-dark:#dc2626;
  --surface:#fff;--bg:#f1f5f9;--text:#1e293b;--text2:#64748b;--border:#e2e8f0;
  --radius:16px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
  --shadow-lg:0 4px 24px rgba(0,0,0,.12);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
.container{max-width:720px;margin:0 auto}

.header{background:linear-gradient(135deg,#1e293b 0%,#334155 100%);color:#fff;border-radius:var(--radius);padding:32px 24px;margin-bottom:24px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.header::after{content:'';position:absolute;top:-40%;right:-10%;width:220px;height:220px;background:rgba(255,255,255,.06);border-radius:50%}
.header h1{font-size:24px;font-weight:700;margin-bottom:6px}
.header p{opacity:.7;font-size:14px}

.section-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;padding-left:4px}

.test-list{display:flex;flex-direction:column;gap:12px;margin-bottom:32px}

.test-card{background:var(--surface);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s;text-decoration:none;color:inherit;display:block;border:2px solid transparent;position:relative;overflow:hidden}
.test-card:hover{border-color:var(--accent, var(--primary));box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.test-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent, var(--primary));border-radius:4px 0 0 4px}
.card-row{display:flex;align-items:center;gap:16px}
.card-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:24px;background:var(--accent-light, var(--primary-light));color:var(--accent, var(--primary))}
.card-icon .material-icons-round{font-size:26px}
.card-body{flex:1;min-width:0}
.card-title{font-size:16px;font-weight:700;margin-bottom:4px}
.card-meta{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.card-meta span{display:flex;align-items:center;gap:4px}
.card-meta .material-icons-round{font-size:15px}
.card-arrow{color:var(--text2);flex-shrink:0}
.card-arrow .material-icons-round{font-size:22px}

/* Progress mini bar */
.mini-progress{margin-top:10px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.mini-bar{flex:1;height:5px;background:var(--border);border-radius:4px;overflow:hidden}
.mini-fill{height:100%;border-radius:4px;transition:width .4s ease;background:var(--accent, var(--primary))}
.mini-stats{display:flex;gap:10px;margin-top:8px}
.mini-stat{font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px}
.mini-stat.correct{background:var(--success-light);color:var(--success-dark)}
.mini-stat.wrong{background:var(--error-light);color:var(--error-dark)}
.mini-stat.unanswered{background:var(--bg);color:var(--text2)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Trắc Nghiệm Y Khoa</h1>
    <p>Chọn bộ câu hỏi để bắt đầu ôn tập</p>
  </div>

  <div class="section-title">Bộ câu hỏi</div>
  <div class="test-list" id="test-list"></div>
</div>

<script>
const TESTS = [
  {
    title: 'Hóa Sinh',
    subtitle: 'Trắc nghiệm Hóa Sinh',
    url: 'quiz.html?data=hoasinh',
    dataUrl: 'data/hoasinh.json',
    storageKey: 'hoasinh_quiz_progress',
    icon: 'science',
    accent: '#4361ee',
    accentLight: '#eef2ff',
  },
  {
    title: 'Tổ Chức Quản Lý Y Tế',
    subtitle: 'Trắc nghiệm TCQLYT',
    url: 'quiz.html?data=to-chuc-quan-ly-y-te',
    dataUrl: 'data/to-chuc-quan-ly-y-te.json',
    storageKey: 'tcqlyt_quiz_progress',
    icon: 'account_balance',
    accent: '#0ea5e9',
    accentLight: '#e0f2fe',
  },
  {
    title: 'Dịch Tễ Học',
    subtitle: 'Trắc nghiệm Dịch tễ học - Sức khỏe môi trường',
    url: 'quiz.html?data=dich-te-hoc',
    dataUrl: 'data/dich-te-hoc.json',
    storageKey: 'dichtehoc_quiz_progress',
    icon: 'coronavirus',
    accent: '#10b981',
    accentLight: '#ecfdf5',
  },
  {
    title: 'Sinh Lý Bệnh và Miễn Dịch Học',
    subtitle: 'Trắc nghiệm SLB & Miễn dịch',
    url: 'quiz.html?data=sinh-ly-benh',
    dataUrl: 'data/sinh-ly-benh.json',
    storageKey: 'slb_quiz_progress',
    icon: 'biotech',
    accent: '#8b5cf6',
    accentLight: '#ede9fe',
  },
];

async function loadProgress(test) {
  let total = '?';
  try {
    const res = await fetch(test.dataUrl);
    const d = await res.json();
    total = d.questions.length;
  } catch(e) {}

  let answered = 0, correct = 0, wrong = 0;
  try {
    const saved = localStorage.getItem(test.storageKey);
    if (saved) {
      const d = JSON.parse(saved);
      const ans = d.answers || {};
      answered = Object.keys(ans).length;
      // We don't have questions here to check correctness easily — show answered count only
    }
  } catch(e) {}

  return { total, answered };
}

async function render() {
  const list = document.getElementById('test-list');

  const cards = await Promise.all(TESTS.map(async (t) => {
    const { total, answered } = await loadProgress(t);
    const pct = total !== '?' && total > 0 ? Math.round((answered / total) * 100) : 0;

    return { t, total, answered, pct };
  }));

  list.innerHTML = cards.map(({ t, total, answered, pct }) => `
    <a class="test-card" href="${t.url}"
       style="--accent:${t.accent};--accent-light:${t.accentLight}">
      <div class="card-row">
        <div class="card-icon">
          <span class="material-icons-round">${t.icon}</span>
        </div>
        <div class="card-body">
          <div class="card-title">${t.title}</div>
          <div class="card-meta">
            <span><span class="material-icons-round">help_outline</span> ${total} câu hỏi</span>
            <span><span class="material-icons-round">check_circle_outline</span> Đã làm: ${answered}</span>
          </div>
          ${total !== '?' && total > 0 ? `
          <div class="mini-progress">
            <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
            <span>${pct}%</span>
          </div>` : ''}
        </div>
        <div class="card-arrow"><span class="material-icons-round">chevron_right</span></div>
      </div>
    </a>
  `).join('');
}

render();
</script>
</body>
</html>
